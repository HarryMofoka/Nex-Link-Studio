<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beacon | Cafe & Bakery</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f4f7f4] text-[#2c402c] font-sans antialiased">
  
      <!-- Beacon Cafe Theme -->
      <nav class="p-6 max-w-6xl mx-auto flex justify-between items-center relative z-10">
        <div class="w-12 h-12 bg-[#8eb28e] rounded-full flex items-center justify-center text-white font-bold text-xl shadow-md">B.</div>
        <div class="hidden md:flex gap-8 font-bold text-sm uppercase tracking-widest text-[#4c664c]">
          <a href="#" class="hover:text-[#2c402c]">Menu</a>
          <a href="#" class="hover:text-[#2c402c]">Location</a>
          <a href="#" class="hover:text-[#2c402c]">Our Story</a>
        </div>
        <button class="bg-[#2c402c] text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-[#1a261a] transition">Order Pickup</button>
      </nav>
      
      <main class="max-w-6xl mx-auto px-6 py-20 flex flex-col md:flex-row items-center gap-16">
        <div class="flex-1 text-center md:text-left">
          <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-6 text-[#2c402c]">Morning.<br/>Brewed right.</h1>
          <p class="text-xl text-[#4c664c] mb-10 max-w-md mx-auto md:mx-0">Your neighborhood spot for ceremonial grade matcha, artisan pastries, and community connection.</p>
          <button class="bg-[#8eb28e] text-white px-10 py-5 rounded-full font-bold text-lg hover:bg-[#729972] transition shadow-xl">See the Menu</button>
        </div>
        <div class="flex-1">
          <div class="w-full max-w-md mx-auto aspect-square bg-[#d9e6d9] rounded-full overflow-hidden relative shadow-2xl border-8 border-white">
            <!-- Organic shape placeholder -->
            <div class="absolute inset-0 flex items-center justify-center text-[#8eb28e] font-bold text-2xl">Latte Art Image</div>
          </div>
        </div>
      </main>
    
</body>
</html>
