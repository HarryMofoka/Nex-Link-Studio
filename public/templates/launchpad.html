<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launchpad | MVP Tech Startup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050014] text-white font-sans antialiased overflow-x-hidden">
  
      <!-- Launchpad MVP Theme -->
      <div class="fixed inset-0 bg-gradient-to-br from-[#050014] via-[#1a0033] to-[#400080] -z-10"></div>
      
      <main class="min-h-screen flex flex-col items-center justify-center p-6 text-center relative">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#9900ff] blur-[150px] opacity-20 rounded-full pointer-events-none"></div>
        
        <div class="relative z-10 max-w-3xl">
          <div class="inline-block border border-[#9900ff]/30 bg-[#9900ff]/10 text-[#e6b3ff] px-4 py-1.5 rounded-full text-xs font-bold tracking-widest uppercase mb-8">
            Entering Beta Phase
          </div>
          <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-6 text-transparent bg-clip-text bg-gradient-to-r from-white via-[#e6b3ff] to-[#9900ff]">
            The future of AI automation.
          </h1>
          <p class="text-xl text-neutral-400 mb-10 max-w-2xl mx-auto">
            Stop doing manual data entry. Our neural engine automates 90% of your workflow instantly. Join 14,000+ waitlist users.
          </p>
          
          <form class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto mb-16">
            <input type="email" placeholder="Enter your email address" class="flex-1 bg-white/5 border border-white/10 rounded-xl px-6 py-4 text-white focus:outline-none focus:border-[#9900ff]" required>
            <button type="submit" class="bg-gradient-to-r from-[#9900ff] to-[#cc33ff] text-white px-8 py-4 rounded-xl font-bold hover:opacity-90 transition shadow-[0_0_30px_rgba(153,0,255,0.4)]">Get Early Access</button>
          </form>

          <div class="flex items-center justify-center gap-8 opacity-50">
            <div class="font-bold text-2xl">Y COMBINATOR</div>
            <div class="font-bold text-2xl">SEQUOIA</div>
            <div class="font-bold text-2xl">A16Z</div>
          </div>
        </div>
      </main>
    
</body>
</html>
