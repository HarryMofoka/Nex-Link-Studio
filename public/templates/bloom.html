<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom | Photography</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1a0f14] text-white font-sans antialiased">
  
      <!-- Bloom Photography Theme -->
      <div class="w-full h-screen overflow-hidden relative flex items-center">
        <div class="absolute inset-0 bg-gradient-to-r from-[#ff3366]/20 to-[#cc00ff]/20 z-10 pointer-events-none mix-blend-overlay"></div>
        <div class="w-[300vw] flex gap-8 px-8 h-[80vh] items-center relative z-20">
           <!-- Side scrolling gallery concept -->
           <div class="w-[80vw] md:w-[60vw] h-full bg-neutral-800 shrink-0 relative flex items-end p-12 hover:scale-[0.98] transition duration-500">
             <h2 class="text-6xl font-bold text-white mix-blend-difference">Vogue Italia<br/><span class="text-sm font-normal tracking-widest uppercase mt-4 block">Editorial Shoot</span></h2>
           </div>
           <div class="w-[80vw] md:w-[60vw] h-full bg-neutral-700 shrink-0 relative flex items-end p-12 hover:scale-[0.98] transition duration-500">
             <h2 class="text-6xl font-bold text-white mix-blend-difference">The Met Gala<br/><span class="text-sm font-normal tracking-widest uppercase mt-4 block">Event Coverage</span></h2>
           </div>
        </div>
        
        <div class="absolute bottom-12 left-12 z-30">
          <div class="text-3xl font-bold tracking-tighter">Bloom.</div>
          <div class="text-xs uppercase tracking-widest mt-2 opacity-50">Cinematic Storytelling</div>
        </div>
      </div>
    
</body>
</html>
