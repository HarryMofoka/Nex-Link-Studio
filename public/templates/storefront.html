<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storefront | Modern E-Commerce</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-50 text-neutral-900 font-sans antialiased">
  
      <!-- Storefront Ecom Theme -->
      <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-lg border-b border-neutral-200">
        <div class="max-w-[1600px] mx-auto px-8 h-20 flex items-center justify-between">
          <div class="flex items-center gap-8">
            <div class="font-bold text-2xl tracking-tighter text-teal-800">Storefront.</div>
            <div class="hidden md:flex gap-6 text-sm font-medium text-neutral-600">
              <a href="#" class="hover:text-teal-700 transition">New Arrivals</a>
              <a href="#" class="hover:text-teal-700 transition">Men</a>
              <a href="#" class="hover:text-teal-700 transition">Women</a>
            </div>
          </div>
          <div class="flex items-center gap-4">
             <button class="w-10 h-10 rounded-full bg-neutral-100 flex items-center justify-center hover:bg-neutral-200">🔍</button>
             <button class="w-10 h-10 rounded-full bg-teal-600 text-white flex items-center justify-center hover:bg-teal-700">🛒</button>
          </div>
        </div>
      </nav>
      
      <main class="pt-20">
        <div class="w-full h-[70vh] bg-teal-900 relative flex items-center justify-center text-center">
          <div class="absolute inset-0 bg-black/20"></div>
          <div class="relative z-10">
            <span class="text-teal-300 font-bold tracking-widest uppercase text-sm mb-4 block">Summer Collection 2026</span>
            <h1 class="text-6xl md:text-8xl font-bold tracking-tighter text-white mb-8">Organic.<br/>Minimal.</h1>
            <button class="bg-white text-teal-900 px-10 py-4 rounded-full font-bold hover:bg-teal-50 transition shadow-xl">Shop Collection</button>
          </div>
        </div>
      </main>

      <section class="py-24 max-w-[1600px] mx-auto px-8">
        <div class="flex justify-between items-end mb-12">
          <h2 class="text-3xl font-bold tracking-tight">Trending Now</h2>
          <a href="#" class="text-teal-700 font-bold hover:underline">View All &rarr;</a>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
          <!-- Item 1 -->
          <div class="group cursor-pointer">
            <div class="bg-neutral-200 aspect-[3/4] mb-4 overflow-hidden rounded-2xl relative">
              <div class="absolute inset-0 flex items-center justify-center bg-black/5 opacity-0 group-hover:opacity-100 transition">
                <button class="bg-white text-black font-bold px-6 py-2 rounded-full shadow-lg transform translate-y-4 group-hover:translate-y-0 transition">Quick Add</button>
              </div>
            </div>
            <h3 class="font-bold text-neutral-800">Linen Essential Shirt</h3>
            <p class="text-neutral-500">$85.00</p>
          </div>
          <!-- Item 2 -->
          <div class="group cursor-pointer">
            <div class="bg-neutral-200 aspect-[3/4] mb-4 overflow-hidden rounded-2xl relative"></div>
            <h3 class="font-bold text-neutral-800">Pleated Trousers</h3>
            <p class="text-neutral-500">$120.00</p>
          </div>
           <!-- Item 3 -->
           <div class="group cursor-pointer">
            <div class="bg-neutral-200 aspect-[3/4] mb-4 overflow-hidden rounded-2xl relative"></div>
            <h3 class="font-bold text-neutral-800">Organic Cotton Tee</h3>
            <p class="text-neutral-500">$45.00</p>
          </div>
           <!-- Item 4 -->
           <div class="group cursor-pointer">
            <div class="bg-neutral-200 aspect-[3/4] mb-4 overflow-hidden rounded-2xl relative"></div>
            <h3 class="font-bold text-neutral-800">Wool Overcoat</h3>
            <p class="text-neutral-500">$295.00</p>
          </div>
        </div>
      </section>
    
</body>
</html>
