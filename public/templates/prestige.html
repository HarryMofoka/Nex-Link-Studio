<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prestige | Luxury Real Estate</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121212] text-white font-serif antialiased">
  
      <!-- Prestige Luxury Theme -->
      <nav class="absolute w-full z-50 p-10 flex justify-between items-center mix-blend-difference">
        <div class="text-xl tracking-[0.3em] uppercase">Prestige Group</div>
        <div class="w-10 h-10 border border-white rounded-full flex flex-col justify-center items-center gap-1.5 cursor-pointer">
          <div class="w-4 h-px bg-white"></div>
          <div class="w-4 h-px bg-white"></div>
        </div>
      </nav>

      <main class="w-full h-screen relative">
        <div class="absolute inset-0 bg-neutral-900 flex items-center justify-center">
          <div class="text-neutral-700 text-2xl font-sans tracking-widest">Cinematic 4K Property Video</div>
        </div>
        <div class="absolute inset-0 bg-black/40"></div>
        
        <div class="absolute bottom-20 left-10 md:left-20 max-w-2xl">
          <h1 class="text-5xl md:text-7xl font-light mb-4">The Penthouse<br/>at 432 Park.</h1>
          <div class="flex items-center gap-6 mt-8">
             <div class="text-[#d4af37] text-xl">$85,000,000</div>
             <div class="w-12 h-px bg-white/30"></div>
             <div class="text-sm tracking-widest uppercase font-sans">Available</div>
          </div>
        </div>
        
        <div class="absolute bottom-20 right-10 md:right-20">
          <button class="bg-transparent border border-[#d4af37] text-[#d4af37] px-8 py-4 font-sans text-xs font-bold uppercase tracking-widest hover:bg-[#d4af37] hover:text-black transition duration-500">Inquire Privately</button>
        </div>
      </main>
    
</body>
</html>
