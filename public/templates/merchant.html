<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merchant | Industrial Ecom</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-900 font-sans antialiased">
  
      <!-- Merchant E-Commerce Theme -->
      <nav class="bg-cyan-900 text-white p-4 text-center text-xs font-bold uppercase tracking-widest">
        Free global shipping on orders over $1,000
      </nav>
      <header class="border-b border-slate-200 p-6 flex justify-between items-center bg-white sticky top-0 z-50">
        <div class="text-2xl font-black tracking-tighter">MERCHANT</div>
        <div class="w-full max-w-xl px-8 hidden md:block">
          <input type="text" placeholder="Search by SKU, Brand, or Category..." class="w-full bg-slate-100 border-none rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-cyan-600">
        </div>
        <button class="bg-cyan-600 text-white px-6 py-2.5 rounded-lg text-sm font-bold shadow-md">Cart (0)</button>
      </header>
      
      <div class="flex">
        <!-- Filter Sidebar -->
        <aside class="w-64 border-r border-slate-200 p-6 hidden lg:block h-screen sticky top-[80px]">
          <h3 class="font-bold text-sm uppercase tracking-widest mb-6 text-slate-500">Filters</h3>
          
          <div class="mb-8">
            <h4 class="font-bold mb-3">Category</h4>
            <label class="flex items-center gap-3 mb-2 text-sm"><input type="checkbox" class="accent-cyan-600"> Industrial Motors</label>
            <label class="flex items-center gap-3 mb-2 text-sm"><input type="checkbox" class="accent-cyan-600"> HVAC Systems</label>
            <label class="flex items-center gap-3 mb-2 text-sm"><input type="checkbox" class="accent-cyan-600"> Power Tools</label>
          </div>
          
          <div class="mb-8">
            <h4 class="font-bold mb-3">Availability</h4>
            <label class="flex items-center gap-3 mb-2 text-sm"><input type="checkbox" class="accent-cyan-600" checked> In Stock Only</label>
          </div>
        </aside>
        
        <!-- Grid -->
        <main class="flex-1 p-6 md:p-10 bg-slate-50">
          <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Industrial Motors (423 results)</h1>
            <select class="border border-slate-300 rounded px-3 py-1 text-sm bg-white"><option>Sort by Price: Low to High</option></select>
          </div>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6">
            <!-- Product Card -->
            <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm hover:shadow-lg transition">
              <div class="bg-slate-100 aspect-square rounded-lg mb-4 flex items-center justify-center">Image</div>
              <div class="text-xs font-bold text-cyan-600 mb-1">SKU: MOT-8923</div>
              <h3 class="font-bold text-sm mb-2 h-10 line-clamp-2">High-Torque Brushless Servo Motor 3000RPM</h3>
              <div class="flex justify-between items-end mt-4">
                <div class="text-xl font-black">$845.00</div>
                <button class="bg-slate-900 text-white w-8 h-8 flex items-center justify-center rounded-md font-bold">+</button>
              </div>
            </div>
             <!-- Product Card 2 -->
             <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm hover:shadow-lg transition">
              <div class="bg-slate-100 aspect-square rounded-lg mb-4 flex items-center justify-center">Image</div>
              <div class="text-xs font-bold text-cyan-600 mb-1">SKU: MOT-4412</div>
              <h3 class="font-bold text-sm mb-2 h-10 line-clamp-2">Standard AC Induction Motor Frame 145T</h3>
              <div class="flex justify-between items-end mt-4">
                <div class="text-xl font-black">$320.00</div>
                <button class="bg-slate-900 text-white w-8 h-8 flex items-center justify-center rounded-md font-bold">+</button>
              </div>
            </div>
          </div>
        </main>
      </div>
    
</body>
</html>
